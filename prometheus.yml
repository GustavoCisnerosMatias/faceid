global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'sara-service-monitor'

scrape_configs:
  - job_name: 'sara-service'
    static_configs:
      - targets: ['localhost:8083']
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    scrape_timeout: 5s
